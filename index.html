<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мастер-ключ — мини-тест</title>
<style>
    :root {
        --paper: #f8f1e3; --ink: #2c2118; --accent: #b85c2e;
        --accent-2: #4a7c59; --danger: #b3402e; --line: #d4c3a8;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--paper);
        color: var(--ink); padding: 20px 10px; line-height: 1.6; }
    .container { max-width: 780px; margin: 0 auto; }
    h1 { font-family: Georgia, serif; font-size: 29px; margin-bottom: 8px; }
    h2 { font-family: Georgia, serif; margin-top: 0; }
    .muted { color: #8c7459; }
    .card { background: #fffef7; border: 1px solid var(--line); border-radius: 16px;
        padding: 28px; margin-bottom: 20px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
    input[type="text"] { width: 100%; padding: 14px; border: 2px solid var(--line);
        border-radius: 12px; font-size: 17px; margin-bottom: 20px; }
    .step { display: none; }
    .step.active { display: block; animation: fade .35s ease; }
    @keyframes fade { from {opacity:0;transform:translateY(6px);} to {opacity:1;transform:none;} }
    /* код всегда слева-направо, даже в арабском */
    pre { background: #2c2118; color: #f4e9d8; padding: 16px; border-radius: 12px;
        overflow-x: auto; font-size: 14.5px; line-height: 1.5; tab-size: 4;
        white-space: pre; direction: ltr; text-align: left; }
    code { background: #efe4cf; padding: 1px 6px; border-radius: 5px; font-size: 14px;
        direction: ltr; unicode-bidi: embed; }
    .tag { display:inline-block; font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; }
    .tag.easy { background:#e3efe0; color:#3a6b4a; }
    .tag.hard { background:#f3ddd8; color:#9c3522; }
    .lang-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .lang-btn { padding:7px 14px; border:2px solid var(--line); border-radius:999px;
        background:#fffef7; cursor:pointer; font-size:14px; }
    .lang-btn.active { border-color:var(--accent); background:#fdf4e8; font-weight:600; }
    .scale-q { margin-bottom: 22px; }
    .scale-q .label { font-weight: 600; margin-bottom: 10px; }
    .scale-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .scale-opt { flex: 1; min-width: 96px; text-align: center; padding: 10px 6px;
        border: 2px solid var(--line); border-radius: 10px; cursor: pointer;
        font-size: 13px; user-select: none; transition: .15s; }
    .scale-opt .num { display:block; font-size: 17px; font-weight: 700; margin-bottom: 2px; }
    .scale-opt:hover { border-color: var(--accent); }
    .scale-opt.selected { border-color: var(--accent); background: #fdf4e8; }
    .option { padding: 14px 16px; border: 2px solid var(--line); border-radius: 12px;
        margin-bottom: 10px; cursor: pointer; transition: .15s; font-size: 16px; }
    .option:hover { border-color: var(--accent); }
    .option.selected { border-color: var(--accent); background: #fdf4e8; }
    .progress { height: 8px; background: var(--line); border-radius: 999px; margin: 4px 0 22px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .4s ease; }
    .qcount { font-size: 13px; color: #8c7459; margin-bottom: 4px; }
    .btn { padding: 15px 28px; font-size: 16px; font-weight: 600; border: none;
        border-radius: 12px; cursor: pointer; width: 100%; margin: 8px 0; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: #f5e8d0; color: var(--ink); }
    .btn-row { display: flex; gap: 10px; }
    .hint { font-size: 13px; color: var(--danger); min-height: 18px; }
    .knobs li { margin-bottom: 6px; }
    .trace { background:#f3ece0; border-left:4px solid var(--accent); padding:12px 16px;
        border-radius:8px; font-size:14px; direction: ltr; text-align: left; }
    .chart { display: flex; gap: 60px; align-items: flex-end; height: 230px; justify-content: center; margin: 24px 0 8px; }
    .bar-wrap { text-align: center; }
    .bar { width: 80px; border-radius: 8px 8px 0 0; margin: auto; transition: height .6s ease; }
    .bar-val { font-weight: 700; margin-bottom: 6px; }
    .bar-label { margin-top: 8px; font-weight: 600; }
    .verdict { text-align: center; font-family: Georgia, serif; font-size: 26px; margin: 10px 0; }
    .verdict.up { color: var(--accent-2); }
    .verdict.down { color: var(--danger); }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
    th, td { padding: 9px 8px; border-bottom: 1px solid var(--line); text-align: start; }
    th { color: #8c7459; font-weight: 600; }
    td.num, th.num { text-align: end; }
    .delta-up { color: var(--accent-2); font-weight: 700; }
    .delta-down { color: var(--danger); font-weight: 700; }
    .footer { text-align: center; margin-top: 40px; color: #8c7459; font-size: 13px; }
</style>
</head>
<body>
<div class="container">

    <!-- 1. ВВЕДЕНИЕ -->
    <div id="intro" class="step active">
        <div class="lang-bar" id="lang-bar"></div>
        <h1 id="introTitle"></h1>
        <p class="muted" id="introSubtitle"></p>
        <div id="closed-banner" class="card" style="display:none;border-color:var(--accent);background:#fdf4e8">

            <input type="text" id="student-name">

                <span id="consentText"></span>
            </label>
            <p class="hint" id="name-hint"></p>
            <button class="btn btn-primary" id="startBtn" onclick="startFlow()"></button>
        </div>
    </div>

    <!-- 2. ПСИХОТЕСТ ДО A -->
    <div id="psych1" class="step">
        <div class="card">
            <h2 id="p1Title"></h2>
            <p class="muted" id="p1Sub"></p>
            <div id="survey1-items"></div>
            <p class="hint" id="psych1-hint"></p>
            <button class="btn btn-primary" id="p1Btn" onclick="submitSurvey(1)"></button>
        </div>
    </div>

    <!-- 3 + 6. ЗАДАНИЕ -->
    <div id="task" class="step">
        <div class="card">
            <h2 id="task-title"></h2>
            <p><span id="task-tag" class="tag"></span></p>
            <pre id="task-code"></pre>
            <div class="qcount" id="task-qcount"></div>
            <div class="progress"><div id="task-progress" class="progress-fill"></div></div>
            <div class="scale-q label" id="task-question"></div>
            <div id="task-options"></div>
            <p class="hint" id="task-hint"></p>
            <div class="btn-row">
                <button class="btn btn-secondary" id="task-prev" onclick="taskPrev()"></button>
                <button class="btn btn-primary" id="task-next" onclick="taskNext()"></button>
            </div>
        </div>
    </div>

    <!-- 4. УЧЕБНЫЙ БЛОК -->
    <div id="learn" class="step">
        <div class="card" id="learn-card"></div>
    </div>

    <!-- 5. ПСИХОТЕСТ ДО B -->
    <div id="psych2" class="step">
        <div class="card">
            <h2 id="p2Title"></h2>
            <p class="muted" id="p2Sub"></p>
            <div id="survey2-items"></div>
            <p class="hint" id="psych2-hint"></p>
            <button class="btn btn-primary" id="p2Btn" onclick="submitSurvey(2)"></button>
        </div>
    </div>

    <!-- 7. РЕЗУЛЬТАТ -->
    <div id="result" class="step">
        <div class="card">
            <h2 id="result-title"></h2>
            <p class="muted" id="resultNote"></p>
            <div id="comparison-chart" class="chart"></div>
            <div id="verdict" class="verdict"></div>
            <table id="subscales"></table>
            <h3 style="font-family:Georgia,serif;margin-top:26px" id="taskResultsHeader"></h3>
            <table id="task-scores"></table>
            <p class="muted" style="font-size:13px;margin-top:8px" id="taskNote"></p>
            <p id="submit-status" style="font-size:13px;margin:6px 0"></p>
            <button class="btn btn-secondary" id="downloadBtn" onclick="exportCSV()"></button>
            <div id="export-panel" style="display:none;margin-top:14px">
                <p class="muted" style="font-size:13px" id="exportHint"></p>
                <textarea id="csv-text" readonly
                    style="width:100%;height:120px;border:2px solid var(--line);border-radius:10px;
                    padding:10px;font-family:monospace;font-size:12px;background:#fffef7;color:var(--ink);direction:ltr"></textarea>
                <button class="btn btn-secondary" id="copyBtn" onclick="copyCSV(this)"></button>
            </div>
            <button class="btn btn-secondary" id="retakeBtn" onclick="location.reload()"></button>
        </div>
    </div>
</div>

<div class="footer">
    Мастер-ключ © 2026 · Zenodo DOI: 10.5281/zenodo.20649460 · CC BY-NC-ND 4.0
</div>

/* ---------- Код заданий (нейтрален к языку) ---------- */
const BLOCKS = {
    A: `def process(data, factor=2):
    if not data or len(data) <= 1:
        return sum(data) if data else 0
    mid = len(data) // 2
    left = process(data[:mid], factor)
    right = process(data[mid:], factor)
    return left + right * factor`,
    B: `def process(data, factor=3):
    if not data or len(data) <= 1:
        return sum(data) * factor if data else 1
    mid = len(data) // 2
    left = process(data[:mid], factor)
    right = process(data[mid:], factor - 1)
    return left * factor + right`
};

/* Индексы правильных вариантов (одинаковы для всех языков) */
const CORRECT = {
    A: [1, 0, 0, 0, 1, 0, 0, 0, 0, 0],

/* ---------- Параметры вариантов: какие тексты подставлять ---------- */
function optionsA(T) {
    return [
        ["1","2","3","0"],
        ["0","1","None", T.err],
        ["5","10","0","2"],
        ["10","20","5","0"],
        ["1","2","3","4"],
        [`[1,2] ${conj(T)} [3,4]`, `[1] ${conj(T)} [2,3,4]`, `[1,2,3] ${conj(T)} [4]`, `[1,2,3,4] ${conj(T)} []`],
        ["17","13","10","20"],
        ["10","6","8","12"],
        ["27","21","15","30"],
        ["10","27","14","7"]
    ];
}
function optionsB(T) {
    return [
        ["1","0","3","None"],
        ["15","5","8","3"],
        ["factor","factor - 1","factor + 1","factor // 2"],
        ["26","18","14","30"],
        ["39","27","33","45"],
        ["26","30","22","18"],
        ["55","48","60","42"],
        ["110","96","120","88"],
        ["15","30","21","12"],
        [`B → 1, A → 0`, `${T.both} → 0`, `B → 0, A → 1`, `${T.both} → 1`]
    ];
}
function conj(T) {
    return T === I18N.ru ? "и" : T === I18N.en ? "and" : T === I18N.ar ? "و" : "na";
}

/* ---------- Состояние ---------- */
let lang = 'ru';
const state = { name: "", startedAt: "", t0: 0, survey1: {}, survey2: {}, answersA: [], answersB: [] };

/* ---------- Применение языка ---------- */
function setLang(l) {
    lang = l;
    const T = I18N[l];
    document.documentElement.dir = T.dir;
    document.documentElement.lang = l;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.l === l));
    const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
    set('introTitle', T.title); set('introSubtitle', T.subtitle);
    set('nameLabel', T.nameLabel); document.getElementById('student-name').placeholder = T.namePh;
    set('consentText', T.consent); set('startBtn', T.start);
    set('p1Title', T.p1Title); set('p1Sub', T.p1Sub); set('p1Btn', T.toA);
    set('p2Title', T.p2Title); set('p2Sub', T.p2Sub); set('p2Btn', T.toB);
    set('task-prev', T.back);
    set('resultNote', T.resultNote); set('taskResultsHeader', T.taskResults);
    set('taskNote', T.taskNote); set('downloadBtn', T.download);
    set('exportHint', T.exportHint); set('copyBtn', T.copy); set('retakeBtn', T.retake);
    // учебный блок
    const lc = document.getElementById('learn-card');
    lc.innerHTML = T.learn;
    const cp = lc.querySelector('.code-pre');
    if (cp) cp.textContent = BLOCKS.A;
}

function renderLangBar() {
    document.getElementById('lang-bar').innerHTML = Object.keys(I18N).map(l =>
        `<button class="lang-btn" data-l="${l}" onclick="setLang('${l}')">${I18N[l].name}</button>`).join('');
}

/* ---------- Навигация ---------- */
function goTo(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startFlow() {
    const T = I18N[lang];
    if (!document.getElementById('consent').checked) {
        document.getElementById('name-hint').textContent = T.consentReq;
        return;
    }
    state.name = document.getElementById('student-name').value.trim() || 'Anon';
    state.startedAt = new Date().toISOString();
    state.t0 = Date.now();
    state.answersA = Array(10).fill(null);
    state.answersB = Array(10).fill(null);
    renderSurvey(1); renderSurvey(2);
    goTo('psych1');
}

/* ---------- Опрос ---------- */
function renderSurvey(which) {
    const T = I18N[lang];
    const box = document.getElementById('survey' + which + '-items');
    box.innerHTML = T.survey.map((text, qi) => `
        <div class="scale-q">
            <div class="label">${qi + 1}. ${text}</div>
            <div class="scale-row">
                ${T.scale.map((lbl, i) => `
                    <div class="scale-opt" onclick="pickScale(${which}, ${qi}, ${i + 1}, this)">
                        <span class="num">${i + 1}</span>${lbl}
                    </div>`).join('')}
            </div>
        </div>`).join('');
}
function pickScale(which, qi, value, el) {
    (which === 1 ? state.survey1 : state.survey2)['q' + (qi + 1)] = value;
    el.parentElement.querySelectorAll('.scale-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('psych' + which + '-hint').textContent = '';
}
function submitSurvey(which) {
    const store = which === 1 ? state.survey1 : state.survey2;
    if (Object.keys(store).length < 6) {
        document.getElementById('psych' + which + '-hint').textContent = I18N[lang].surveyAll;
        return;
    }
    if (which === 1) startTask('A'); else startTask('B');
}

/* ---------- Движок задания ---------- */
let currentTask = 'A';
let qIndex = 0;

function startTask(t) {
    currentTask = t; qIndex = 0;
    const T = I18N[lang];
    const meta = t === 'A' ? T.taskA : T.taskB;
    document.getElementById('task-title').textContent = meta.title;
    const tag = document.getElementById('task-tag');
    tag.className = 'tag ' + (t === 'A' ? 'easy' : 'hard');
    tag.textContent = meta.tag;
    document.getElementById('task-code').textContent = BLOCKS[t];
    goTo('task');
    renderTaskQuestion();
}

function renderTaskQuestion() {
    const T = I18N[lang];
    const qText = (currentTask === 'A' ? T.qA : T.qB)[qIndex];
    const opts = (currentTask === 'A' ? optionsA(T) : optionsB(T))[qIndex];
    const answers = currentTask === 'A' ? state.answersA : state.answersB;
    const total = 10;

    document.getElementById('task-qcount').textContent = T.qOf(qIndex + 1, total);
    document.getElementById('task-progress').style.width = ((qIndex + 1) / total * 100) + '%';
    document.getElementById('task-question').textContent = qText;
    document.getElementById('task-options').innerHTML = opts.map((opt, oi) => `
        <div class="option ${answers[qIndex] === oi ? 'selected' : ''}" onclick="pickTask(${oi}, this)">${opt}</div>`).join('');
    document.getElementById('task-hint').textContent = '';
    document.getElementById('task-prev').disabled = (qIndex === 0);
    document.getElementById('task-next').textContent = (qIndex === total - 1)
        ? (currentTask === 'A' ? T.toLesson : T.showResult) : T.next;
}

function pickTask(oi, el) {
    const answers = currentTask === 'A' ? state.answersA : state.answersB;
    answers[qIndex] = oi;
    el.parentElement.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('task-hint').textContent = '';
}

function taskPrev() { if (qIndex > 0) { qIndex--; renderTaskQuestion(); } }

function taskNext() {
    const answers = currentTask === 'A' ? state.answersA : state.answersB;
    if (answers[qIndex] === null) {
        document.getElementById('task-hint').textContent = I18N[lang].chooseAnswer;
        return;
    }
    if (qIndex < 9) { qIndex++; renderTaskQuestion(); }
    else if (currentTask === 'A') goTo('learn');
    else { computeResults(); goTo('result'); }
}

/* ---------- Подсчёт ---------- */
function stateIndex(ans) {
    let sum = 0;
    SURVEY_META.forEach((m, i) => { const v = ans['q' + (i + 1)]; sum += (m.pol === 'pos') ? v : (6 - v); });
    return Math.round((sum - 6) / 24 * 1000) / 10;
}
function subscalePct(ans, dim) {
    const idx = SURVEY_META.map((m, i) => m.dim === dim ? i : -1).filter(i => i >= 0);
    const avg = idx.reduce((s, i) => s + ans['q' + (i + 1)], 0) / idx.length;
    return Math.round((avg - 1) / 4 * 1000) / 10;
}
function scoreTask(t) {
    const answers = t === 'A' ? state.answersA : state.answersB;
    return CORRECT[t].reduce((s, c, i) => s + (answers[i] === c ? 1 : 0), 0);
}
function straightLine(ans) {
    const vals = Object.values(ans);
    return vals.length === 6 && vals.every(v => v === vals[0]);
}

function computeResults() {
    const T = I18N[lang];
    const a = stateIndex(state.survey1), b = stateIndex(state.survey2);
    const deltaPP = Math.round((b - a) * 10) / 10;
    const rel = a > 0 ? Math.round((b - a) / a * 1000) / 10 : null;
    const duration = Math.round((Date.now() - state.t0) / 1000);
    const suspect = (duration < MIN_SECONDS || straightLine(state.survey1) || straightLine(state.survey2)) ? 1 : 0;

    document.getElementById('result-title').textContent = state.name;

    const barH = pct => Math.max(6, Math.round(pct / 100 * 200));
    document.getElementById('comparison-chart').innerHTML = `
        <div class="bar-wrap"><div class="bar-val">${a}%</div>
            <div class="bar" style="height:${barH(a)}px;background:var(--line)"></div>
            <div class="bar-label">${T.beforeA}</div></div>
        <div class="bar-wrap"><div class="bar-val">${b}%</div>
            <div class="bar" style="height:${barH(b)}px;background:var(--accent)"></div>
            <div class="bar-label">${T.beforeB}</div></div>`;

    const vEl = document.getElementById('verdict');
    if (deltaPP > 0) { vEl.className = 'verdict up'; vEl.textContent = `${T.stateUp}: +${deltaPP} ${T.pp}` + (rel !== null ? ` (+${rel}%)` : ''); }
    else if (deltaPP < 0) { vEl.className = 'verdict down'; vEl.textContent = `${T.stateDown}: ${deltaPP} ${T.pp}` + (rel !== null ? ` (${rel}%)` : ''); }
    else { vEl.className = 'verdict'; vEl.textContent = T.stateSame; }

    const dims = [
        { key: 'anxiety', label: T.dimAnx, good: 'down' },
        { key: 'fear', label: T.dimFear, good: 'down' },
        { key: 'confidence', label: T.dimConf, good: 'up' }
    ];
    let rows = `<tr><th>${T.subHead[0]}</th><th class="num">${T.subHead[1]}</th><th class="num">${T.subHead[2]}</th><th class="num">${T.subHead[3]}</th></tr>`;
    dims.forEach(d => {
        const pa = subscalePct(state.survey1, d.key), pb = subscalePct(state.survey2, d.key);
        const dd = Math.round((pb - pa) * 10) / 10;
        const improved = d.good === 'down' ? dd < 0 : dd > 0;
        const cls = dd === 0 ? '' : (improved ? 'delta-up' : 'delta-down');
        rows += `<tr><td>${d.label}</td><td class="num">${pa}%</td><td class="num">${pb}%</td>
                 <td class="num ${cls}">${dd > 0 ? '+' : ''}${dd} ${T.pp}</td></tr>`;
    });
    document.getElementById('subscales').innerHTML = rows;

    const sa = scoreTask('A'), sb = scoreTask('B');
    document.getElementById('task-scores').innerHTML = `
        <tr><th>${T.colBlock}</th><th>${T.colDiff}</th><th class="num">${T.colCorrect}</th><th class="num">${T.colPct}</th></tr>
        <tr><td>A</td><td>${T.diffEasy}</td><td class="num">${sa} / 10</td><td class="num">${sa * 10}%</td></tr>
        <tr><td>B</td><td>${T.diffHard}</td><td class="num">${sb} / 10</td><td class="num">${sb * 10}%</td></tr>`;

    state._computed = { a, b, deltaPP, rel, sa, sb, duration, suspect };
    submitResult();
}

/* ---------- Экспорт / отправка ---------- */
function buildRow() {
    const c = state._computed;
    const head = ['name', 'lang', 'started_at', 'duration_sec', 'suspect'];
    const row = [state.name, lang, state.startedAt, c.duration, c.suspect];
    for (let i = 1; i <= 6; i++) { head.push('s1_q' + i); row.push(state.survey1['q' + i]); }
    for (let i = 1; i <= 6; i++) { head.push('s2_q' + i); row.push(state.survey2['q' + i]); }
    head.push('index_A', 'index_B', 'delta_pp', 'delta_pct');
    row.push(c.a, c.b, c.deltaPP, c.rel);
    for (let i = 0; i < 10; i++) { head.push('A_q' + (i + 1)); row.push(state.answersA[i]); }
    for (let i = 0; i < 10; i++) { head.push('B_q' + (i + 1)); row.push(state.answersB[i]); }
    head.push('scoreA', 'scoreB'); row.push(c.sa, c.sb);
    return { header: head, row: row };
}
function buildCSV() {
    const { header, row } = buildRow();
    const esc = v => `"${String(v).replace(/"/g, '""')}"`;
    return header.join(',') + '\n' + row.map(esc).join(',');
}
function exportCSV() {
    const csv = buildCSV();
    document.getElementById('csv-text').value = csv;
    document.getElementById('export-panel').style.display = 'block';
    try {
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'master-key_' + state.name.replace(/\s+/g, '_') + '.csv';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {}
}
function copyCSV(btn) {
    const ta = document.getElementById('csv-text');
    ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e) {}
    if (!ok && navigator.clipboard) navigator.clipboard.writeText(ta.value).catch(() => {});
    const old = btn.textContent;
    btn.textContent = I18N[lang].copied;
    setTimeout(() => { btn.textContent = old; }, 1500);
}
function submitResult() {
    const note = document.getElementById('submit-status');
    if (!SUBMIT_URL) { note.textContent = ''; return; }
    try {
        fetch(SUBMIT_URL, { method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(buildRow()) });
        note.style.color = 'var(--accent-2)'; note.textContent = I18N[lang].submitted;
    } catch (e) {
        note.style.color = 'var(--danger)'; note.textContent = I18N[lang].submitFail;
    }
}

/* ---------- Проверка набора (JSONP) ---------- */
function checkOpen() {
    if (!SUBMIT_URL) return;
    const cb = 'mk_cb_' + Date.now();
    window[cb] = function (res) {
        delete window[cb];
        if (res && res.open === false) {
            document.getElementById('closed-text').textContent = I18N[lang].closed(res.count, res.limit);
            document.getElementById('closed-banner').style.display = 'block';
        }
    };
    const s = document.createElement('script');
    s.src = SUBMIT_URL + (SUBMIT_URL.indexOf('?') > -1 ? '&' : '?') + 'callback=' + cb + '&_=' + Date.now();
    s.onerror = function () { delete window[cb]; };
    document.body.appendChild(s);
}

/* ---------- Старт ---------- */
renderLangBar();
const _code = (navigator.language || 'ru').slice(0, 2);
setLang(_code in I18N ? _code : 'ru');
window.addEventListener('DOMContentLoaded', checkOpen);
</script>
